
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
:root{--accent:#5B4CDB;--sidebar-w:220px}
.app{display:flex;height:620px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);position:relative}
.login-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--color-background-secondary)}
.login-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:32px 28px;width:320px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:48px;height:48px;border-radius:14px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.login-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--color-text-secondary)}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500}
.lfield input{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 11px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);outline:none}
.lfield input:focus{border-color:var(--accent)}
.login-err{font-size:12px;color:#A32D2D;margin-bottom:10px;background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--border-radius-md);padding:7px 10px;display:none}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);transition:all .15s;width:100%}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.88}
.btn-sm{padding:5px 10px;font-size:12px;width:auto}
.tab-bar{display:flex;gap:4px;margin-bottom:18px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-secondary);border:0.5px solid transparent;transition:all .15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-tertiary)}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
.band-info{padding:16px 14px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.band-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.band-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.user-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);margin-top:auto}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#3C3489;flex-shrink:0}
.user-name{font-size:12px;color:var(--color-text-primary);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:11px;color:var(--color-text-secondary);cursor:pointer;padding:3px 6px;border-radius:4px;border:none;background:none}
.logout-btn:hover{color:#A32D2D}
.nav{padding:8px 6px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.nav-icon{width:15px;height:15px;flex-shrink:0}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:14px 18px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.content{flex:1;overflow-y:auto;padding:18px}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.member-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:18px 14px;text-align:center;background:var(--color-background-primary)}
.avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;margin:0 auto 9px}
.member-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.member-role{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.setlist-list,.schedule-list,.memo-list{display:flex;flex-direction:column;gap:9px}
.sl-card,.sc-card,.mo-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 15px;background:var(--color-background-primary)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.song-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--color-text-secondary)}
.sc-row{display:flex;gap:12px;align-items:center}
.date-box{min-width:44px;text-align:center;border-radius:var(--border-radius-md);padding:5px 4px;background:var(--color-background-secondary)}
.date-m{font-size:9px;color:var(--color-text-secondary);text-transform:uppercase}
.date-d{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.sc-info{flex:1}
.sc-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.sc-detail{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.mo-meta{display:flex;justify-content:space-between;margin-bottom:5px}
.mo-author{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.mo-date{font-size:11px;color:var(--color-text-secondary)}
.mo-body{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.del-btn{font-size:11px;color:var(--color-text-secondary);cursor:pointer;padding:2px 5px;border-radius:4px;border:none;background:none}
.del-btn:hover{color:#A32D2D}
.empty{text-align:center;padding:36px 20px;color:var(--color-text-secondary);font-size:13px}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:100;border-radius:var(--border-radius-lg)}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:20px;width:300px;max-height:460px;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--color-text-primary)}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.field textarea{resize:vertical;min-height:72px}
.mfoot{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.admin-badge{font-size:10px;background:#EEEDFE;color:#3C3489;border-radius:20px;padding:1px 7px;font-weight:500}
</style>

<div class="app" id="app">
  <div id="login-screen" class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="9" cy="7" r="3.5" fill="#534AB7"/>
            <path d="M2 19c0-3.9 3.1-7 7-7s7 3.1 7 7H2z" fill="#534AB7"/>
            <circle cx="17" cy="7" r="2.8" fill="#AFA9EC"/>
            <path d="M17 13.5c2.4 0 5.5 1.5 5.5 4.9H17" stroke="#AFA9EC" stroke-width="1.2" fill="none"/>
          </svg>
        </div>
        <div class="login-title" id="login-mode-title">침대는 장식용이다</div>
        <div class="login-sub" id="login-mode-sub">여긴 자는 곳이 아니다</div>
      </div>
      <div class="tab-bar">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
        <div class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</div>
      </div>
      <div id="login-err" class="login-err"></div>
      <div id="login-form">
        <div class="lfield"><label>아이디</label><input id="l-id" placeholder="아이디 입력" autocomplete="username"></div>
        <div class="lfield"><label>비밀번호</label><input id="l-pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password"></div>
        <button class="btn btn-primary" onclick="doLogin()">로그인</button>
      </div>
      <div id="signup-form" style="display:none">
        <div class="lfield"><label>아이디</label><input id="s-id" placeholder="영문/숫자 조합"></div>
        <div class="lfield"><label>비밀번호</label><input id="s-pw" type="password" placeholder="6자 이상"></div>
        <div class="lfield"><label>닉네임</label><input id="s-nick" placeholder="밴드에서 불릴 이름"></div>
        <button class="btn btn-primary" onclick="doSignup()">가입하기</button>
      </div>
    </div>
  </div>

  <div id="main-screen" style="display:none;flex:1;display:none;overflow:hidden">
    <div class="sidebar">
      <div class="band-info">
        <div class="band-name">침대는 장식용이다</div>
        <div class="band-sub" id="band-sub">멤버 0명</div>
      </div>
      <nav class="nav">
        <div class="nav-item active" data-page="members">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="6" cy="4.5" r="2.5"/><path d="M1 13c0-2.8 2.2-5 5-5s5 2.2 5 5H1z"/><circle cx="11" cy="4.5" r="2"/><path d="M11 9.5c1.7 0 4 1.1 4 3.5h-4"/></svg>
          멤버
        </div>
        <div class="nav-item" data-page="setlist">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="3" width="12" height="1.5" rx="0.5"/><rect x="2" y="7" width="12" height="1.5" rx="0.5"/><rect x="2" y="11" width="8" height="1.5" rx="0.5"/></svg>
          셋리스트
        </div>
        <div class="nav-item" data-page="schedule">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="3" width="12" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.2"/></svg>
          일정
        </div>
        <div class="nav-item" data-page="memo">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.2"/></svg>
          메모
        </div>
      </nav>
      <div class="user-row">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-nick">-</div>
          <div id="sidebar-badge"></div>
        </div>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div><div class="page-title" id="page-title">멤버</div><div id="sleep-quote" style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;"></div></div>
        <button class="btn btn-primary btn-sm" id="add-btn" onclick="openAdd()">+ 추가</button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-inner"></div>
  </div>
</div>

<script>
const AC=[{bg:'#EEEDFE',c:'#3C3489'},{bg:'#E1F5EE',c:'#085041'},{bg:'#FAECE7',c:'#712B13'},{bg:'#FBEAF0',c:'#72243E'},{bg:'#E6F1FB',c:'#0C447C'},{bg:'#EAF3DE',c:'#27500A'},{bg:'#FAEEDA',c:'#633806'}];
const ROLES=['보컬','기타','베이스','드럼','키보드','바이올린','피아노','색소폰','보컬/기타','보컬/베이스','기타/키보드'];
let state={members:[],setlists:[],schedules:[],memos:[]};
let users={};
let me=null;
let page='members';

async function loadAll(){
  const r = await fetch('/api/state');
  const data = await r.json();
  state = data.state || {members:[],setlists:[],schedules:[],memos:[]};
  if(!state.members)state.members=[];
  if(!state.setlists)state.setlists=[];
  if(!state.schedules)state.schedules=[];
  if(!state.memos)state.memos=[];
}
async function saveState(){
  await fetch('/api/state', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(state)
  });
}
async function saveUsers(){}

function showErr(msg){const el=document.getElementById('login-err');el.textContent=msg;el.style.display='block';}
function hideErr(){document.getElementById('login-err').style.display='none';}
function switchTab(t){
  hideErr();
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-signup').classList.toggle('active',t==='signup');
  document.getElementById('login-form').style.display=t==='login'?'block':'none';
  document.getElementById('signup-form').style.display=t==='signup'?'block':'none';
}
async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  if(!id||!pw){showErr('아이디와 비밀번호를 입력해주세요.');return;}
  const res=await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,pw})
  });
  const data=await res.json();
  if(!data.ok){showErr(data.message||'로그인에 실패했어요.');return;}
  me={id:data.user.id,nick:data.user.nick,isAdmin:data.user.isAdmin};
  hideErr();
  await const quotes = [
  "눕는 순간 패배다",
  "잠은 사치다",
  "오늘도 무수면",
  "각성 상태 유지 중",
  "침대는 인테리어다",
  "우리는 눕지 않는다"
];
function setQuote(){
  const q = quotes[Math.floor(Math.random()*quotes.length)];
  const el = document.getElementById('sleep-quote');
  if(el) el.textContent = q;
}
setQuote();

loadAll();
  enterApp();
}
async function doSignup(){
  const id=document.getElementById('s-id').value.trim();
  const pw=document.getElementById('s-pw').value;
  const nick=document.getElementById('s-nick').value.trim();
  if(!id||!pw||!nick){showErr('모든 항목을 입력해주세요.');return;}
  if(id.length<2){showErr('아이디는 2자 이상이어야 해요.');return;}
  if(pw.length<6){showErr('비밀번호는 6자 이상이어야 해요.');return;}
  const res=await fetch('/api/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,pw,nick})
  });
  const data=await res.json();
  if(!data.ok){showErr(data.message||'가입에 실패했어요.');return;}
  me={id:data.user.id,nick:data.user.nick,isAdmin:data.user.isAdmin};
  hideErr();
  await loadAll();
  enterApp();
}
function doLogout(){
  me=null;
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-id').value='';
  document.getElementById('l-pw').value='';
  hideErr();
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  const ms=document.getElementById('main-screen');
  ms.style.display='flex';
  document.getElementById('sidebar-nick').textContent=me.nick;
  document.getElementById('sidebar-avatar').textContent=me.nick[0];
  document.getElementById('sidebar-badge').innerHTML=me.isAdmin?'<span class="admin-badge">관리자</span>':'';
  render();
}

document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>{page=el.dataset.page;render();}));
document.getElementById('l-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('l-id').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pw').focus();});

function avStyle(i){const c=AC[i%AC.length];return `background:${c.bg};color:${c.c};`;}
function initials(n){return n?n[0]:'?';}

function renderMembers(){
  if(!state.members.length)return`<div class="empty">아직 멤버가 없어요.<br>+ 추가 버튼으로 등록해보세요!</div>`;
  return`<div class="member-grid">${state.members.map((m,i)=>`
    <div class="member-card">
      <div class="avatar" style="${avStyle(i)}">${initials(m.name)}</div>
      <div class="member-name">${m.name}</div>
      <div class="member-role">${m.role}</div>
      ${me.isAdmin?`<div style="margin-top:9px;display:flex;gap:5px;justify-content:center"><button class="btn btn-sm" onclick="editMember(${i})">편집</button><button class="del-btn" onclick="delMember(${i})">삭제</button></div>`:''}
    </div>`).join('')}</div>`;
}
function renderSetlist(){
  if(!state.setlists.length)return`<div class="empty">셋리스트가 없어요.</div>`;
  return`<div class="setlist-list">${state.setlists.map((s,i)=>`
    <div class="sl-card">
      <div class="card-head"><div class="card-title">${s.title}</div>${me.isAdmin?`<button class="del-btn" onclick="delSetlist(${i})">삭제</button>`:''}</div>
      <div class="song-chips">${s.songs.map(sg=>`<span class="chip">${sg}</span>`).join('')}</div>
    </div>`).join('')}</div>`;
}
function renderSchedule(){
  const sorted=[...state.schedules].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!sorted.length)return`<div class="empty">일정이 없어요.</div>`;
  const ms=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return`<div class="schedule-list">${sorted.map(s=>{
    const d=new Date(s.date);const oi=state.schedules.indexOf(s);
    return`<div class="sc-card"><div class="sc-row">
      <div class="date-box"><div class="date-m">${ms[d.getMonth()]}</div><div class="date-d">${d.getDate()}</div></div>
      <div class="sc-info"><div class="sc-title">${s.title}</div><div class="sc-detail">${[s.place,s.time].filter(Boolean).join(' · ')}</div></div>
      ${me.isAdmin?`<button class="del-btn" onclick="delSchedule(${oi})">삭제</button>`:''}
    </div></div>`;}).join('')}</div>`;
}
function renderMemo(){
  if(!state.memos.length)return`<div class="empty">메모가 없어요.</div>`;
  return`<div class="memo-list">${[...state.memos].reverse().map((m,ri)=>{
    const i=state.memos.length-1-ri;
    const canDel=me.isAdmin||m.authorId===me.id;
    return`<div class="mo-card">
      <div class="mo-meta"><span class="mo-author">${m.author}</span><div style="display:flex;gap:6px;align-items:center"><span class="mo-date">${m.date}</span>${canDel?`<button class="del-btn" onclick="delMemo(${i})">삭제</button>`:''}</div></div>
      <div class="mo-body">${m.body}</div>
    </div>`;}).join('')}</div>`;
}

function render(){
  const titles={members:'멤버',setlist:'셋리스트',schedule:'일정',memo:'메모'};
  document.getElementById('page-title').textContent=titles[page];
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const addBtn=document.getElementById('add-btn');
  addBtn.style.display=(page==='memo'||me.isAdmin)?'block':'none';
  document.getElementById('band-sub').textContent=`멤버 ${state.members.length}명`;
  const fns={members:renderMembers,setlist:renderSetlist,schedule:renderSchedule,memo:renderMemo};
  document.getElementById('content').innerHTML=fns[page]();
}

function showModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

function openAdd(){
  if(page==='members'&&me.isAdmin)showAddMember();
  else if(page==='setlist'&&me.isAdmin)showAddSetlist();
  else if(page==='schedule'&&me.isAdmin)showAddSchedule();
  else if(page==='memo')showAddMemo();
}
function showAddMember(){showModal(`<h3>멤버 추가</h3>
  <div class="field"><label>이름</label><input id="mn" placeholder="이름"></div>
  <div class="field"><label>파트</label><select id="mr">${ROLES.map(r=>`<option>${r}</option>`).join('')}</select></div>
  <div class="mfoot"><button class="btn btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="addMember()">추가</button></div>`);}
function addMember(){
  const name=document.getElementById('mn').value.trim();const role=document.getElementById('mr').value;
  if(!name)return;state.members.push({name,role});saveState();render();closeModal();
}
window.editMember=function(i){
  const m=state.members[i];
  showModal(`<h3>멤버 편집</h3>
    <div class="field"><label>이름</label><input id="mn" value="${m.name}"></div>
    <div class="field"><label>파트</label><select id="mr">${ROLES.map(r=>`<option ${r===m.role?'selected':''}>${r}</option>`).join('')}</select></div>
    <div class="mfoot"><button class="btn btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="saveMember(${i})">저장</button></div>`);
};
window.saveMember=function(i){
  state.members[i].name=document.getElementById('mn').value.trim()||state.members[i].name;
  state.members[i].role=document.getElementById('mr').value;
  saveState();render();closeModal();
};
window.delMember=function(i){if(confirm('멤버를 삭제할까요?')){state.members.splice(i,1);saveState();render();}};
function showAddSetlist(){showModal(`<h3>셋리스트 추가</h3>
  <div class="field"><label>제목</label><input id="slt" placeholder="5월 공연 셋리스트"></div>
  <div class="field"><label>곡 목록 (한 줄에 하나)</label><textarea id="slg" placeholder="곡명 1&#10;곡명 2"></textarea></div>
  <div class="mfoot"><button class="btn btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="addSetlist()">추가</button></div>`);}
function addSetlist(){
  const title=document.getElementById('slt').value.trim();
  const songs=document.getElementById('slg').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!title||!songs.length)return;state.setlists.push({title,songs});saveState();render();closeModal();
}
window.delSetlist=function(i){if(confirm('삭제할까요?')){state.setlists.splice(i,1);saveState();render();}};
function showAddSchedule(){
  const today=new Date().toISOString().split('T')[0];
  showModal(`<h3>일정 추가</h3>
    <div class="field"><label>일정 이름</label><input id="sct" placeholder="정기 연습"></div>
    <div class="field"><label>날짜</label><input id="scd" type="date" value="${today}"></div>
    <div class="field"><label>시간</label><input id="sctm" placeholder="오후 7시"></div>
    <div class="field"><label>장소</label><input id="scp" placeholder="합주실 A"></div>
    <div class="mfoot"><button class="btn btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="addSchedule()">추가</button></div>`);
}
function addSchedule(){
  const title=document.getElementById('sct').value.trim();const date=document.getElementById('scd').value;
  const time=document.getElementById('sctm').value.trim();const place=document.getElementById('scp').value.trim();
  if(!title||!date)return;state.schedules.push({title,date,time,place});saveState();render();closeModal();
}
window.delSchedule=function(i){if(confirm('삭제할까요?')){state.schedules.splice(i,1);saveState();render();}};
function showAddMemo(){showModal(`<h3>메모 작성</h3>
  <div class="field"><label>내용</label><textarea id="mob" placeholder="공지, 연습 내용, 아이디어..."></textarea></div>
  <div class="mfoot"><button class="btn btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="addMemo()">작성</button></div>`);}
function addMemo(){
  const body=document.getElementById('mob').value.trim();if(!body)return;
  const now=new Date();
  const date=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.memos.push({author:me.nick,authorId:me.id,body,date});saveState();render();closeModal();
}
window.delMemo=function(i){if(confirm('삭제할까요?')){state.memos.splice(i,1);saveState();render();}};

loadAll();
</script>
